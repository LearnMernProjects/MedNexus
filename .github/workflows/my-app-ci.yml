name: My App CI

on:
  push:
    branches: [master]
    paths:
      - "my-app/**"
      - ".github/workflows/my-app-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "my-app/**"
      - ".github/workflows/my-app-ci.yml"
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
